<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Baby Shower</title>
  <link rel="stylesheet" href="edicion.css">
</head>
<body>

  <!-- PANTALLA 1: El botón que el usuario DEBE tocar para permitir el sonido -->
  <div id="gatekeeper" class="gatekeeper-screen">
    <div class="gatekeeper-box">
      <h2>¡Te ha llegado una sorpresa!</h2>
      <button class="play-btn" ontouchstart="startExperience()" onclick="startExperience()">Toca para abrir ✉️</button>
    </div>
  </div>

  <!-- PANTALLA 2: El video empieza con sonido después del clic -->
  <div id="welcomeScreen" class="welcome-screen hidden">
    <!-- ATENCIÓN: Aquí NO va la palabra 'muted' para que pueda sonar -->
    <video loop playsinline id="bgVideo" class="bg-video">
      <source src="ciguena.mp4" type="video/mp4">
    </video>

    <h1 class="main-title">¡Una entrega especial para el Baby Shower!</h1>

    <div class="bottom-content">
      <p class="custom-instruction">Presiona aquí para ver la invitación</p>
      <button class="action-btn" ontouchstart="openInvitation()" onclick="openInvitation()">Ver invitación</button>
    </div>
  </div>

  <script src="ciguena"></script>
</body>
</html>
